name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Check shell syntax
        run: bash -n bm

      - name: Build
        run: make build VERSION=ci

      - name: Smoke test
        run: |
          ./bin/bm --version
          ./bin/bm --help
